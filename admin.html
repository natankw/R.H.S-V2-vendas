<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - RHS Vendas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <span class="logo">⚙️ Admin</span>
      <button id="logoutBtn" class="btn-secondary">Sair</button>
    </div>
  </header>

  <main class="container admin">
    <div id="loginArea" class="admin-login">
      <h2>Login Administrativo</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="adminEmail" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="adminPassword" required />
        </div>
        <button type="submit" class="btn-primary full">Entrar</button>
      </form>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="produtos">Produtos</button>
        <button class="tab-btn" data-tab="pedidos">Pedidos</button>
      </div>

      <div id="tabProdutos" class="tab-content">
        <button id="addProdutoBtn" class="btn-primary">+ Novo Produto</button>
        <div id="produtosAdminList" class="admin-list"></div>
      </div>

      <div id="tabPedidos" class="tab-content" style="display:none;">
        <div id="pedidosAdminList" class="admin-list"></div>
      </div>

      <!-- MODAL PRODUTO -->
      <div id="produtoModal" class="modal">
        <div class="modal-content">
          <span class="modal-close">&times;</span>
          <h3 id="modalTitle">Novo Produto</h3>
          <form id="produtoForm">
            <input type="hidden" id="produtoId" />
            <div class="form-group"><label>Nome</label><input type="text" id="pNome" required /></div>
            <div class="form-group"><label>Imagem (URL)</label><input type="url" id="pImagem" required /></div>
            <div class="form-group"><label>Categoria</label><input type="text" id="pCategoria" required /></div>
            <div class="form-group"><label>Descrição</label><textarea id="pDescricao" rows="3"></textarea></div>
            <div class="form-group"><label>Preço (R$)</label><input type="number" step="0.01" id="pPreco" required /></div>
            <div class="form-group"><label>Tipo</label><input type="text" id="pTipo" placeholder="ex: Template, Curso" /></div>
            <div class="form-group"><label>Entrega</label><input type="text" id="pEntrega" placeholder="ex: Download, E-mail" /></div>
            <button type="submit" class="btn-primary full">Salvar</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/banco.js"></script>
  <script src="js/admin.js"></script>
</body>
                                                              </html>
